apiVersion: batch/v1
kind: Job
metadata:
  name: starrocks-init
  labels:
    app.kubernetes.io/name: starrocks-fe
    {{- include "chart.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-fe
          image: docker-registry.dv-api.com/cloud/busybox:1.36
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - |
              echo "Waiting for StarRocks FE..."
              until nc -z starrocks-fe 9030; do sleep 5; done
              echo "FE ready."
              sleep 15
      containers:
        - name: init-sql
          image: docker-registry.dv-api.com/cloud/mysql:8.0.45
          imagePullPolicy: Always
          command:
            - bash
            - -c
            - |
              set -euo pipefail
              HOST="starrocks-fe"
              PORT=9030

              echo "=== CN registration handled by CN init containers ==="

              echo "=== Creating default storage volume ==="
              mysql -h "$HOST" -P "$PORT" -u root --ssl-mode=DISABLED -e "
                CREATE STORAGE VOLUME IF NOT EXISTS mv_storage_volume
                TYPE = S3
                LOCATIONS = ('s3://{{ .Values.starrocks.fe.s3.bucket }}/{{ .Values.starrocks.fe.s3.path }}')
                PROPERTIES (
                  'aws.s3.region' = '{{ .Values.starrocks.fe.s3.region }}',
                  'aws.s3.use_instance_profile' = '{{ .Values.starrocks.fe.s3.useInstanceProfile }}',
                  'aws.s3.endpoint' = 's3.{{ .Values.starrocks.fe.s3.region }}.amazonaws.com'
                );
                SET mv_storage_volume AS DEFAULT STORAGE VOLUME;
              " 2>&1 || echo "Storage volume may already exist"

              echo "=== Verifying storage volume ==="
              mysql -h "$HOST" -P "$PORT" -u root --ssl-mode=DISABLED -e "DESC STORAGE VOLUME mv_storage_volume\G"

              echo "=== Creating Iceberg catalog ==="
              mysql -h "$HOST" -P "$PORT" -u root --ssl-mode=DISABLED -e "
                CREATE EXTERNAL CATALOG IF NOT EXISTS iceberg_catalog
                PROPERTIES (
                  'type' = 'iceberg',
                  'iceberg.catalog.type' = 'rest',
                  'iceberg.catalog.uri' = '{{ .Values.iceberg.restCatalog.uri }}',
                  'aws.s3.region' = '{{ .Values.starrocks.fe.s3.region }}',
                  'aws.s3.use_instance_profile' = '{{ .Values.starrocks.fe.s3.useInstanceProfile }}'
                );
              "

              echo "=== Verifying catalogs ==="
              mysql -h "$HOST" -P "$PORT" -u root --ssl-mode=DISABLED -e "SHOW CATALOGS;"

              {{- if .Values.starrocks.auditLoader.enabled }}
              echo "=== Creating audit database and table ==="
              mysql -h "$HOST" -P "$PORT" -u root --ssl-mode=DISABLED -e "
                CREATE DATABASE IF NOT EXISTS starrocks_audit_db__;
              " 2>&1 || echo "Audit DB may already exist"
              mysql -h "$HOST" -P "$PORT" -u root --ssl-mode=DISABLED -e "
                CREATE TABLE IF NOT EXISTS starrocks_audit_db__.starrocks_audit_tbl__ (
                  queryId        VARCHAR(64),
                  timestamp      DATETIME       NOT NULL,
                  queryType      VARCHAR(12),
                  clientIp       VARCHAR(32),
                  user           VARCHAR(64),
                  authorizedUser VARCHAR(64),
                  resourceGroup  VARCHAR(64),
                  catalog        VARCHAR(32),
                  db             VARCHAR(96),
                  state          VARCHAR(8),
                  errorCode      VARCHAR(512),
                  queryTime      BIGINT,
                  scanBytes      BIGINT,
                  scanRows       BIGINT,
                  returnRows     BIGINT,
                  cpuCostNs      BIGINT,
                  memCostBytes   BIGINT,
                  stmtId         INT,
                  isQuery        TINYINT,
                  feIp           VARCHAR(128),
                  stmt           VARCHAR(1048576),
                  digest         VARCHAR(32),
                  planCpuCosts   DOUBLE,
                  planMemCosts   DOUBLE,
                  pendingTimeMs  BIGINT,
                  candidateMVs   VARCHAR(1048576),
                  hitMvs         VARCHAR(1048576),
                  warehouse      VARCHAR(128)
                ) ENGINE = OLAP
                DUPLICATE KEY (queryId, timestamp, queryType)
                DISTRIBUTED BY HASH (queryId) BUCKETS 3
                PROPERTIES (
                  'replication_num' = '1',
                  'enable_persistent_index' = 'true'
                );
              " 2>&1 || echo "Audit table may already exist"

              echo "=== Installing AuditLoader plugin (idempotent) ==="
              PLUGIN_INSTALLED=$(mysql -h "$HOST" -P "$PORT" -u root --ssl-mode=DISABLED \
                -sN -e "SHOW PLUGINS;" 2>/dev/null | grep -c "AuditLoader" || true)
              if [ "$PLUGIN_INSTALLED" -eq 0 ]; then
                mysql -h "$HOST" -P "$PORT" -u root --ssl-mode=DISABLED \
                  -e "INSTALL PLUGIN FROM '/plugins/auditloader.zip';"
                echo "AuditLoader installed"
              else
                echo "AuditLoader already installed, skipping"
              fi
              {{- end }}

              echo "=== Init complete ==="
