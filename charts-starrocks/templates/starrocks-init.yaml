apiVersion: batch/v1
kind: Job
metadata:
  name: starrocks-init
  labels:
    app.kubernetes.io/name: starrocks-fe
    {{- include "chart.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-fe
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for StarRocks FE..."
              until nc -z starrocks-fe 9030; do sleep 5; done
              echo "FE ready."
              sleep 15
      containers:
        - name: init-sql
          image: mysql:8.0
          command:
            - bash
            - -c
            - |
              set -euo pipefail
              HOST="starrocks-fe"
              PORT=9030

              echo "=== CN registration handled by CN init containers ==="

              echo "=== Creating default storage volume ==="
              mysql -h "$HOST" -P "$PORT" -u root --ssl-mode=DISABLED -e "
                CREATE STORAGE VOLUME IF NOT EXISTS mv_storage_volume
                TYPE = S3
                LOCATIONS = ('s3://{{ .Values.starrocks.fe.s3.bucket }}/{{ .Values.starrocks.fe.s3.path }}')
                PROPERTIES (
                  'aws.s3.region' = '{{ .Values.starrocks.fe.s3.region }}',
                  'aws.s3.use_instance_profile' = '{{ .Values.starrocks.fe.s3.useInstanceProfile }}',
                  'aws.s3.endpoint' = 's3.{{ .Values.starrocks.fe.s3.region }}.amazonaws.com'
                );
                SET mv_storage_volume AS DEFAULT STORAGE VOLUME;
              " 2>&1 || echo "Storage volume may already exist"

              echo "=== Verifying storage volume ==="
              mysql -h "$HOST" -P "$PORT" -u root --ssl-mode=DISABLED -e "DESC STORAGE VOLUME mv_storage_volume\G"

              echo "=== Creating Iceberg catalog ==="
              mysql -h "$HOST" -P "$PORT" -u root --ssl-mode=DISABLED -e "
                CREATE EXTERNAL CATALOG IF NOT EXISTS iceberg_catalog
                PROPERTIES (
                  'type' = 'iceberg',
                  'iceberg.catalog.type' = 'rest',
                  'iceberg.catalog.uri' = '{{ .Values.iceberg.restCatalog.uri }}',
                  'aws.s3.region' = '{{ .Values.starrocks.fe.s3.region }}',
                  'aws.s3.use_instance_profile' = '{{ .Values.starrocks.fe.s3.useInstanceProfile }}'
                );
              "

              echo "=== Verifying catalogs ==="
              mysql -h "$HOST" -P "$PORT" -u root --ssl-mode=DISABLED -e "SHOW CATALOGS;"

              echo "=== Creating AuditLoader database and table ==="
              mysql -h "$HOST" -P "$PORT" -u root --ssl-mode=DISABLED -e "
                CREATE DATABASE IF NOT EXISTS starrocks_audit_db__;
              " 2>&1 || echo "Audit database may already exist"
              mysql -h "$HOST" -P "$PORT" -u root --ssl-mode=DISABLED -e "
                CREATE TABLE IF NOT EXISTS starrocks_audit_db__.starrocks_audit_tbl__ (
                  queryId         VARCHAR(64),
                  timestamp       DATETIME NOT NULL,
                  queryType       VARCHAR(12),
                  clientIp        VARCHAR(32),
                  user            VARCHAR(64),
                  authorizedUser  VARCHAR(64),
                  resourceGroup   VARCHAR(64),
                  catalog         VARCHAR(32),
                  db              VARCHAR(96),
                  state           VARCHAR(8),
                  errorCode       VARCHAR(512),
                  queryTime       BIGINT,
                  scanBytes       BIGINT,
                  scanRows        BIGINT,
                  returnRows      BIGINT,
                  cpuCostNs       BIGINT,
                  memCostBytes    BIGINT,
                  stmtId          INT,
                  isQuery         TINYINT,
                  feIp            VARCHAR(128),
                  stmt            VARCHAR(1048576),
                  digest          VARCHAR(32),
                  planCpuCosts    DOUBLE,
                  planMemCosts    DOUBLE,
                  pendingTimeMs   BIGINT,
                  candidateMVs    VARCHAR(65533) NULL,
                  hitMvs          VARCHAR(65533) NULL,
                  warehouse       VARCHAR(32) NULL
                ) ENGINE = OLAP
                DUPLICATE KEY (queryId, timestamp, queryType)
                PARTITION BY date_trunc('day', timestamp)
                PROPERTIES (
                  'replication_num' = '{{ .Values.starrocks.cn.replicas | default 1 }}',
                  'partition_live_number' = '30'
                );
              " 2>&1 || echo "Audit table may already exist"

              echo "=== Installing AuditLoader plugin ==="
              # INSTALL PLUGIN triggers the FE pod to download the zip from the URL.
              # Requires FE pod to have internet access (NAT gateway or VPC endpoint).
              # If the plugin is already installed, 'INSTALL PLUGIN' returns an error — safe to ignore.
              # For clusters without internet, use scripts/setup-audit-loader.sh instead.
              mysql -h "$HOST" -P "$PORT" -u root --ssl-mode=DISABLED -e "
                INSTALL PLUGIN FROM 'https://releases.starrocks.io/resources/auditloader.zip';
              " 2>&1 || echo "AuditLoader may already be installed"

              echo "=== Verifying plugins ==="
              mysql -h "$HOST" -P "$PORT" -u root --ssl-mode=DISABLED -e "SHOW PLUGINS;"
              echo "=== Init complete ==="
