# Secrets for CRE-6630 production deployment in duckdb namespace.
# Copy this file to 00-secrets.yaml and fill in the passwords before deploying.
---
apiVersion: v1
kind: Secret
metadata:
  name: iceberg-catalog-mysql
  namespace: duckdb
type: Opaque
stringData:
  mysql-root-password: "CHANGE_ME"
  mysql-password: "CHANGE_ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: iceberg-rest-catalog-secret
  namespace: duckdb
type: Opaque
stringData:
  jdbc-user: "iceberg"
  jdbc-password: "CHANGE_ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: iceberg-smt-mysql
  namespace: duckdb
type: Opaque
stringData:
  password: "password"
