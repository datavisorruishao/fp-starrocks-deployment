apiVersion: batch/v1
kind: Job
metadata:
  name: starrocks-init
  namespace: duckdb
  labels:
    app.kubernetes.io/name: starrocks-fe
    app.kubernetes.io/managed-by: manual
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-fe
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for StarRocks FE MySQL port..."
              until nc -z starrocks-fe.duckdb 9030; do
                echo "  not ready yet, retrying in 5s..."
                sleep 5
              done
              echo "FE is ready."
              sleep 15
      containers:
        - name: init-sql
          image: mysql:8.0
          command:
            - bash
            - -c
            - |
              set -euo pipefail
              HOST="starrocks-fe.duckdb"
              PORT=9030

              echo "=== Registering CN with FE ==="
              # Get the CN pod IP dynamically
              # For headless service, use the pod hostname pattern
              mysql -h "$HOST" -P "$PORT" -u root --ssl-mode=DISABLED -e "
                ALTER SYSTEM ADD COMPUTE NODE 'starrocks-cn.duckdb:9050';
              " 2>&1 || echo "CN may already be registered, continuing..."

              echo ""
              echo "=== Verifying CN registration ==="
              mysql -h "$HOST" -P "$PORT" -u root --ssl-mode=DISABLED -e "
                SHOW COMPUTE NODES;
              "

              echo ""
              echo "=== Creating Iceberg external catalog ==="
              mysql -h "$HOST" -P "$PORT" -u root --ssl-mode=DISABLED -e "
                CREATE EXTERNAL CATALOG IF NOT EXISTS iceberg_catalog
                PROPERTIES (
                  'type' = 'iceberg',
                  'iceberg.catalog.type' = 'rest',
                  'iceberg.catalog.uri' = 'http://iceberg-rest-catalog.duckdb:8181',
                  'aws.s3.region' = 'us-west-2',
                  'aws.s3.use_instance_profile' = 'true'
                );
              "

              echo ""
              echo "=== Verifying catalog ==="
              mysql -h "$HOST" -P "$PORT" -u root --ssl-mode=DISABLED -e "
                SHOW CATALOGS;
              "

              echo ""
              echo "=== Init complete ==="
