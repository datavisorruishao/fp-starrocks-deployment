apiVersion: batch/v1
kind: Job
metadata:
  name: iceberg-kafka-connect-register
  labels:
    app.kubernetes.io/name: iceberg-kafka-connect
    {{- include "chart.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-connect
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Kafka Connect REST API..."
              until nc -z iceberg-kafka-connect 8083; do
                echo "  not ready, retrying in 5s..."
                sleep 5
              done
              echo "Ready."
              sleep 10
      containers:
        - name: register
          image: curlimages/curl:8.7.1
          env:
            - name: SMT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: iceberg-smt-mysql
                  key: password
          command:
            - sh
            - -c
            - |
              set -eu
              CONFIG=$(cat /etc/kafka-connect/connector/connector.json | sed "s/PLACEHOLDER_FROM_SECRET/$SMT_PASSWORD/g")
              HTTP_CODE=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
                -X POST http://iceberg-kafka-connect:8083/connectors \
                -H "Content-Type: application/json" \
                -d "$CONFIG")
              cat /tmp/response.txt; echo ""
              if [ "$HTTP_CODE" = "201" ] || [ "$HTTP_CODE" = "409" ]; then
                echo "Connector registered (HTTP $HTTP_CODE)"
              else
                echo "Failed (HTTP $HTTP_CODE)"; exit 1
              fi
          volumeMounts:
            - name: connector-config
              mountPath: /etc/kafka-connect/connector
              readOnly: true
      volumes:
        - name: connector-config
          configMap:
            name: iceberg-kafka-connect-connector
